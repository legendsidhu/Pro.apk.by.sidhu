<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sidhu LR Presets — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #e0e5ec;
      --shadow-light: #ffffff;
      --shadow-dark: #a3b1c6;
      --accent: #c8974a;
      --accent2: #d4a96a;
      --text: #4a5568;
      --text-light: #8a9bb5;
      --card-bg: #e0e5ec;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Floating background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      opacity: 0.18;
      pointer-events: none;
    }
    body::before {
      width: 420px; height: 420px;
      background: radial-gradient(circle, var(--accent2), transparent);
      top: -100px; right: -100px;
      animation: float1 8s ease-in-out infinite;
    }
    body::after {
      width: 320px; height: 320px;
      background: radial-gradient(circle, #7aa7d4, transparent);
      bottom: -80px; left: -80px;
      animation: float2 10s ease-in-out infinite;
    }

    @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,20px)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(15px,-15px)} }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: fadeUp 0.8s ease both;
      width: 100%;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Logo / Brand */
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    
    /* Updated Brand Icon for Logo Image */
    .brand-icon {
      width: 100px; /* Logo size increase kiya hai */
      height: 100px;
      border-radius: 10px;
      background: var(--bg);
      box-shadow: 8px 8px 18px var(--shadow-light), -8px -8px 18px var(--shadow-light);
      display: flex; 
      align-items: center; 
      justify-content: center;
      margin: 0 auto 18px;
      overflow: hidden; /* Image corners round karne ke liye */
    }
    
    .brand-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--accent);
      letter-spacing: 1px;
    }
    .brand p {
      font-size: 0.82rem;
      color: var(--text-light);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* Card */
    .card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 40px 44px 36px;
      width: 90%;
      max-width: 380px;
      box-shadow: 10px 10px 30px var(--shadow-dark), -10px -10px 30px var(--shadow-light);
    }

    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      color: var(--text);
      text-align: center;
      margin-bottom: 28px;
      letter-spacing: 0.5px;
    }

    /* Input Groups */
    .input-group {
      margin-bottom: 22px;
    }
    .input-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-light);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
      padding-left: 4px;
    }
    .input-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg);
      border-radius: 14px;
      padding: 0 16px;
      box-shadow: inset 4px 4px 10px var(--shadow-dark), inset -4px -4px 10px var(--shadow-light);
      transition: box-shadow 0.2s;
    }
    .input-wrap:focus-within {
      box-shadow: inset 5px 5px 12px var(--shadow-dark), inset -5px -5px 12px var(--shadow-light), 0 0 0 2px var(--accent2);
    }
    .input-wrap span {
      font-size: 1rem;
      color: var(--text-light);
      flex-shrink: 0;
    }
    .input-wrap input {
      background: none;
      border: none;
      outline: none;
      width: 100%;
      padding: 14px 0;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
    }

    /* Login Button */
    .btn-login {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 5px 5px 15px rgba(200,151,74,0.4), -3px -3px 10px var(--shadow-light);
      transition: all 0.2s;
      margin-top: 6px;
    }
    .btn-login:hover {
      box-shadow: 7px 7px 20px rgba(200,151,74,0.5), -3px -3px 10px var(--shadow-light);
      transform: translateY(-2px);
    }

    /* Access Now WhatsApp Button */
    .btn-access-now {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 11px;
      width: 100%;
      margin-top: 16px;
      padding: 15px;
      border-radius: 14px;
      background: linear-gradient(135deg, #20b954, #25D366);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      box-shadow: 5px 5px 15px rgba(37,211,102,0.35), -3px -3px 10px var(--shadow-light);
      transition: all 0.2s;
    }

    .footer-note {
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-light);
      margin-top: 22px;
      opacity: 0.7;
    }
    .footer-note a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="brand">
      <div class="brand-icon">
        <img src="https://i.postimg.cc/7YLLR6NG/20260508-000640.png" alt="Sidhu Studio Logo">
      </div>
      <h1>SidhuメStudio</h1>
      <p>Premium Lightroom Collection</p>
    </div>

    <div class="card">
      <h2>Admin Login</h2>

      <div class="input-group">
        <label>Username</label>
        <div class="input-wrap">
          <span>👤</span>
          <input type="text" placeholder="Enter your username" id="username"/>
        </div>
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="input-wrap">
          <span>🔒</span>
          <input type="password" placeholder="Enter your password" id="password"/>
        </div>
      </div>

      <button class="btn-login" onclick="handleLogin()">Login →</button>

      <a class="btn-access-now" href="https://wa.me/923177854793?text=𝗛𝗲𝗹𝗹𝗼 𝗦𝗶𝗿! 𝗠𝗶𝘂𝗷𝗲 𝗨𝘀𝗲𝗿𝗻𝗮𝗺𝗲 𝗢𝗿 𝗣𝗮𝘀𝘀𝘄𝗼𝗿𝗱 𝗕𝘂𝘆 𝗞𝗮𝗿𝗻𝗮 𝗛𝗮" target="_blank">
        Contact Now
      </a>
    </div>

    <p class="footer-note">© 2026 Sidhu LR Presets ·
  </div>

  <script>
    function handleLogin() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();
      if (!u || !p) { alert('Please enter both username and password.'); return; }
      if (u === 'Sidhu Studio' && p === '2687452') {
        window.location.href = 'preset.html';
      } else {
        alert('Invalid credentials. Please contact the admin on WhatsApp.');
      }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  </script>
</body>
</html>
